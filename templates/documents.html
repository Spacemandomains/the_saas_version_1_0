{% extends "base.html" %}
{% block title %}My Documents — AI C-Suite{% endblock %}
{% block page_title %}My Documents{% endblock %}

{% block extra_css %}
<style>
  .agent-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .agent-tab {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: inherit;
  }
  .agent-tab:hover { color: var(--text-primary); }
  .agent-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  .agent-tab .tab-icon {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .agent-tab .tab-count {
    font-size: 11px;
    font-weight: 700;
    background: var(--bg);
    color: var(--text-muted);
    padding: 1px 7px;
    border-radius: 10px;
  }
  .agent-tab.active .tab-count {
    background: #ede9fe;
    color: var(--primary);
  }
  .agent-section { display: none; }
  .agent-section.active { display: block; }
  .empty-agent {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-agent .empty-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
</style>
{% endblock %}

{% block content %}
<div class="agent-tabs" id="agentTabs">
  <button class="agent-tab active" data-agent="all" onclick="switchTab('all')">
    <div class="tab-icon" style="background:#f3f4f6;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#6b7280" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    All
    <span class="tab-count" id="count-all">0</span>
  </button>
  <button class="agent-tab" data-agent="cpo" onclick="switchTab('cpo')">
    <div class="tab-icon" style="background:#ede9fe;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#7c3aed" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    CPO
    <span class="tab-count" id="count-cpo">0</span>
  </button>
  <button class="agent-tab" data-agent="cto" onclick="switchTab('cto')">
    <div class="tab-icon" style="background:#dbeafe;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#93a3b8" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    CTO
    <span class="tab-count" id="count-cto">0</span>
  </button>
  <button class="agent-tab" data-agent="cfo" onclick="switchTab('cfo')">
    <div class="tab-icon" style="background:#d1fae5;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#93a3b8" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    CFO
    <span class="tab-count" id="count-cfo">0</span>
  </button>
  <button class="agent-tab" data-agent="coo" onclick="switchTab('coo')">
    <div class="tab-icon" style="background:#fef3c7;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#93a3b8" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    COO
    <span class="tab-count" id="count-coo">0</span>
  </button>
  <button class="agent-tab" data-agent="cmo" onclick="switchTab('cmo')">
    <div class="tab-icon" style="background:#fce7f3;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#93a3b8" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </div>
    CMO
    <span class="tab-count" id="count-cmo">0</span>
  </button>
  <button class="agent-tab" data-agent="chro" onclick="switchTab('chro')">
    <div class="tab-icon" style="background:#e0f2fe;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#93a3b8" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    CHRO
    <span class="tab-count" id="count-chro">0</span>
  </button>
</div>

<div id="docsContent">
  <p style="color:var(--text-muted);font-size:14px;text-align:center;padding:32px 0;">Loading...</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const AGENTS = {
    cpo:  { name: 'AI CPO', full: 'Chief Product Officer', color: '#7c3aed', bg: '#ede9fe' },
    cto:  { name: 'AI CTO', full: 'Chief Technology Officer', color: '#93a3b8', bg: '#dbeafe' },
    cfo:  { name: 'AI CFO', full: 'Chief Financial Officer', color: '#93a3b8', bg: '#d1fae5' },
    coo:  { name: 'AI COO', full: 'Chief Operating Officer', color: '#93a3b8', bg: '#fef3c7' },
    cmo:  { name: 'AI CMO', full: 'Chief Marketing Officer', color: '#93a3b8', bg: '#fce7f3' },
    chro: { name: 'AI CHRO', full: 'Chief HR Officer', color: '#93a3b8', bg: '#e0f2fe' },
  };

  let allDocs = [];
  let currentTab = 'all';

  function switchTab(agent) {
    currentTab = agent;
    document.querySelectorAll('.agent-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.agent === agent);
    });
    renderDocs();
  }

  function renderDocs() {
    const container = document.getElementById('docsContent');
    const filtered = currentTab === 'all' ? allDocs : allDocs.filter(d => (d.agent || 'cpo') === currentTab);

    if (filtered.length === 0) {
      const agentInfo = AGENTS[currentTab];
      if (currentTab === 'all') {
        container.innerHTML = '<div class="card"><div class="empty-agent"><div class="empty-icon" style="background:#f3f4f6;"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><h3 style="font-size:16px;margin-bottom:8px;">No documents yet</h3><p style="font-size:14px;">Documents generated by your AI C-Suite agents will appear here.</p></div></div>';
      } else if (currentTab === 'cpo') {
        container.innerHTML = '<div class="card"><div class="empty-agent"><div class="empty-icon" style="background:' + agentInfo.bg + ';"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="' + agentInfo.color + '" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><h3 style="font-size:16px;margin-bottom:8px;">No CPO documents yet</h3><p style="font-size:14px;">When the AI CPO runs, generated recaps and briefs will appear here.</p></div></div>';
      } else {
        container.innerHTML = '<div class="card"><div class="empty-agent"><div class="empty-icon" style="background:' + agentInfo.bg + ';"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#d1d5db" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><h3 style="font-size:16px;margin-bottom:8px;">' + agentInfo.name + ' — Coming Soon</h3><p style="font-size:14px;">' + agentInfo.full + ' documents will appear here once the agent is active.</p></div></div>';
      }
      return;
    }

    let html = '<div class="card"><div class="table-wrapper"><table><thead><tr><th>Agent</th><th>Type</th><th>Title</th><th>Created</th><th></th></tr></thead><tbody>';
    filtered.forEach(d => {
      const agent = d.agent || 'cpo';
      const info = AGENTS[agent] || AGENTS.cpo;
      const badge = 'badge-' + d.doc_type;
      const date = formatDate(d.created_at);
      html += '<tr onclick="window.location=\'/app/documents/' + d.id + '\'" style="cursor:pointer">';
      html += '<td><span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:' + info.color + ';background:' + info.bg + ';padding:3px 10px;border-radius:20px;">' + agent.toUpperCase() + '</span></td>';
      html += '<td><span class="badge ' + badge + '">' + escapeHtml(d.doc_type.toUpperCase()) + '</span></td>';
      html += '<td>' + escapeHtml(d.title) + '</td>';
      html += '<td style="color:var(--text-muted)">' + date + '</td>';
      html += '<td><a href="/app/documents/' + d.id + '" style="color:var(--primary);font-size:13px;text-decoration:none;font-weight:600;">View</a></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
    container.innerHTML = html;
  }

  function updateCounts() {
    const counts = { all: allDocs.length, cpo: 0, cto: 0, cfo: 0, coo: 0, cmo: 0, chro: 0 };
    allDocs.forEach(d => {
      const agent = d.agent || 'cpo';
      if (counts[agent] !== undefined) counts[agent]++;
    });
    Object.keys(counts).forEach(k => {
      const el = document.getElementById('count-' + k);
      if (el) el.textContent = counts[k];
    });
  }

  async function loadDocs() {
    try {
      const res = await fetch('/me/docs', { headers: authHeaders() });
      if (!res.ok) throw new Error('Failed to load');
      allDocs = await res.json();
      updateCounts();
      renderDocs();
    } catch (e) {
      document.getElementById('docsContent').innerHTML = '<div class="card"><p style="color:var(--danger);font-size:14px;text-align:center;padding:32px 0;">Failed to load documents.</p></div>';
    }
  }
  loadDocs();
</script>
{% endblock %}
